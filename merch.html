<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boomb6's Storage - Merch</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%230A0A12'/><line x1='4' y1='16' x2='10' y2='16' stroke='%23FF6B00' stroke-width='2'/><line x1='22' y1='16' x2='28' y2='16' stroke='%23FF6B00' stroke-width='2'/><line x1='16' y1='4' x2='16' y2='10' stroke='%23FF6B00' stroke-width='2'/><line x1='16' y1='22' x2='16' y2='28' stroke='%23FF6B00' stroke-width='2'/><circle cx='16' cy='16' r='5' fill='none' stroke='%23FF6B00' stroke-width='2'/><circle cx='16' cy='16' r='2' fill='%23FF6B00'/></svg>" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&family=Noto+Sans+Mono+CJK+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="merch">
    <header class="site-header">
        <nav class="nav-inner">
            <a href="index.html" class="site-logo" data-i18n="site.name">Boomb6's Storage</a>
            <ul class="nav-links">
                <li><a href="index.html" data-page="home" data-i18n="nav.home">HOME</a></li>
                <li><a href="voicebank.html" data-page="voicebank" data-i18n="nav.voicebank">VOICEBANK</a></li>
                <li><a href="gallery.html" data-page="gallery" data-i18n="nav.gallery">GALLERY</a></li>
                <li><a href="videos.html" data-page="videos" data-i18n="nav.videos">VIDEOS</a></li>
                <li><a href="merch.html" data-page="merch" data-i18n="nav.merch">MERCH</a></li>
                <li><a href="blog.html" data-page="blog" data-i18n="nav.blog">BLOG</a></li>
                <li><a href="about.html" data-page="about" data-i18n="nav.about">ABOUT</a></li>
            </ul>
            <div class="lang-switcher">
                <button type="button" data-lang="zh" class="active">中</button>
                <button type="button" data-lang="ja">日</button>
                <button type="button" data-lang="en">EN</button>
            </div>
        </nav>
    </header>

    <main class="main-container">
        <h1 class="page-title" data-i18n="merch.title">OC 周边</h1>
        <p class="page-desc" data-i18n="merch.desc">为我的 OC 设计的周边产品展示。</p>

        <div class="merch-grid">
            <article class="merch-item" data-src="assets/images/merch-acrylic-large.png">
                <img src="assets/images/merch-acrylic.png" alt="Acrylic Stand" onerror="this.style.display='none'">
                <div class="merch-body">
                    <h3 data-i18n="merch.item1">亚克力立牌</h3>
                    <p data-i18n="merch.item1Desc">双面印刷 · 约15cm</p>
                    <a href="https://example.com/merch/acrylic-stand" target="_blank" rel="noopener noreferrer" class="merch-btn" data-i18n="merch.buy">购买</a>
                </div>
            </article>

            <article class="merch-item" data-src="assets/images/merch-badge-large.png">
                <img src="assets/images/merch-badge.png" alt="Badge Set" onerror="this.style.display='none'">
                <div class="merch-body">
                    <h3 data-i18n="merch.item2">徽章套装</h3>
                    <p data-i18n="merch.item2Desc">58mm 马口铁徽章 ×3</p>
                    <a href="https://example.com/merch/badge-set" target="_blank" rel="noopener noreferrer" class="merch-btn" data-i18n="merch.buy">购买</a>
                </div>
            </article>

            <article class="merch-item" data-src="assets/images/merch-postcard-large.png">
                <img src="assets/images/merch-postcard.png" alt="Postcard Set" onerror="this.style.display='none'">
                <div class="merch-body">
                    <h3 data-i18n="merch.item3">明信片组</h3>
                    <p data-i18n="merch.item3Desc">插画明信片 5 张入</p>
                    <a href="https://example.com/merch/postcard" target="_blank" rel="noopener noreferrer" class="merch-btn" data-i18n="merch.buy">购买</a>
                </div>
            </article>
        </div>
    </main>

    <div class="lightbox" id="merch-lightbox">
        <span class="lightbox-close" id="merch-lightbox-close">×</span>
        <img id="merch-lightbox-image" src="" alt="Merch Large Image">
    </div>

    <footer class="site-footer">
        <p data-i18n="footer">© Boomb6 · OC个人站</p>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const merchItems = document.querySelectorAll('.merch-item');
            const lightbox = document.getElementById('merch-lightbox');
            const lightboxImage = document.getElementById('merch-lightbox-image');
            const lightboxClose = document.getElementById('merch-lightbox-close');

            merchItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    if (e.target.closest('.merch-btn')) {
                        return;
                    }
                    const src = this.dataset.src;
                    if (src) {
                        lightboxImage.src = src;
                        lightbox.classList.add('active');
                    }
                });
            });

            lightboxClose.addEventListener('click', function() {
                lightbox.classList.remove('active');
            });

            lightbox.addEventListener('click', function(e) {
                if (e.target === lightbox) {
                    lightbox.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
